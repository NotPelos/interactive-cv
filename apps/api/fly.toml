# Fly.io app config — interactive-cv backend
# App URL: https://notpelos-cv-api.fly.dev
# Docs: https://fly.io/docs/reference/configuration/

app = "notpelos-cv-api"
primary_region = "mad"   # Madrid (closest to Sevilla)

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  # ALLOWED_ORIGIN se inyecta via `flyctl secrets set` (no hardcoded aquí)
  # para poder rotarlo sin redeploy.

[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop dentro del crédito mensual gratis ($5/mes).
  # Cold start ~5-10s pero el frontend tiene fallback estático para /api/cv/pdf
  # mientras el contenedor se levanta.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"      # tiempo de warmup de la JVM
    method = "GET"
    path = "/actuator/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"            # JVM tuneada con -Xmx384m + MaxRAMPercentage=75
  cpu_kind = "shared"
  cpus = 1
