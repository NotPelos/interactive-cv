name: Web — CI

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/web.yml"

# Cancela runs anteriores del mismo PR para no quemar minutos
concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Typecheck · Build · Audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Habilitar corepack (pnpm)
        run: corepack enable

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Instalar dependencias (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck (astro check)
        run: pnpm --filter web typecheck

      - name: Lint (ESLint --max-warnings 0)
        run: pnpm --filter web lint

      - name: Build (astro build)
        # PUBLIC_* env vars se inyectan en el bundle (Astro las lee en build time).
        env:
          PUBLIC_WORKER_URL: "https://notpelos-api.xpelos23.workers.dev"
          PUBLIC_API_URL: "https://notpelos-cv-api.fly.dev"
        run: pnpm --filter web build

      - name: Audit de dependencias (nivel high)
        run: pnpm audit --audit-level=high

      - name: Upload dist como artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

  deploy:
    name: Deploy a Cloudflare Pages
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy a Cloudflare Pages (notpelos)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy apps/web/dist --project-name=notpelos --branch=main --commit-dirty=true
