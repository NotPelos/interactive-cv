name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout cv-content (private — skip si no hay PAT, e.g. PRs externos)
        if: ${{ secrets.CV_CONTENT_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: NotPelos/cv-content
          token: ${{ secrets.CV_CONTENT_PAT }}
          path: personal

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        # pnpm version reads from packageManager in root package.json
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (Chromium only for CI speed)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter web build

      - name: Run unit tests
        run: pnpm --filter web test

      - name: Run E2E tests (Chromium)
        run: pnpm --filter web e2e --project=chromium
        env:
          CI: "true"

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
